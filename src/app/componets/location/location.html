<section class="py-16 text-center bg-gray-50">

<div class="max-w-5xl mx-auto px-6">

<h2 class="text-4xl text-[#0F3D3E] mb-6">
Where the Celebration Begins
</h2>

<p class="text-gray-600 mb-6">
Join us at this beautiful venue
</p>

<h3 class="text-2xl text-[#0F3D3E]">
  {{event?.venue}}
</h3>

<p class="text-gray-600">
  {{event?.nikahDate}} • {{event?.day}}
</p>

<a [href]="event?.mapLink" target="_blank">
  <img src="assets/mapImage.png"
    class="mx-auto mt-6 rounded-xl shadow-lg w-96">
</a>

<p class="mt-6 text-[#D4AF37] text-xl">
  {{event?.brideName}} & {{event?.groomName}}
</p>

</div>

</section>
